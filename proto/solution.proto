syntax = "proto3";

package optimizer;

message VariableMap {
  map<string, double> values = 1;
}

message VariableSet {
  map<string, VariableMap> vars = 1;
}

message Solution {
  VariableSet variable_map = 1;
  double objective_value = 2;
  bool feasible = 3;
  int64 timestamp = 4;
}

service SolutionService {
  rpc SendSolution(Solution) returns (Ack);
}

message Ack {
  bool success = 1;
}
