syntax = "proto3";

package optimizer;

// Represents a dictionary of dictionaries:
// map<string, map<string, double>>
message VariableSet {
  map<string, VariableMap> vars = 1;
}

message VariableMap {
  map<string, double> values = 1;
}

// Metadata for solution quality
message Solution {
  VariableSet variable_map = 1;
  double objective_value = 2;
  bool feasible = 3;
  int64 timestamp = 4;
}

message SolutionUpdate {
  Solution solution = 1;
}

service SolutionStreamer {
  rpc StreamSolutions(stream SolutionUpdate) returns (Ack);
}

message Ack {
  bool success = 1;
}
